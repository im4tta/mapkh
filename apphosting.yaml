# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Specifies the root of your application code.
# This is used by the build system to know where to run build commands.
# For this project, the Next.js app is at the root.
rootDirectory: .
customDomain: www.mapkh.space

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
