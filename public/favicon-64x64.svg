<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded rectangle mask for iOS-style corners -->
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="64" height="64" rx="9.6" ry="9.6"/>
    </clipPath>
    
    <!-- Gradient for 3D shield effect -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F8F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Apply rounded corners -->
  <g clip-path="url(#roundedCorners)">
    <!-- Cambodian flag horizontal stripes (blue-red-blue) -->
    <!-- Top blue stripe -->
    <rect x="0" y="0" width="64" height="21.333333333333332" fill="#032EA1"/>
    
    <!-- Middle red stripe -->
    <rect x="0" y="21.333333333333332" width="64" height="21.333333333333332" fill="#DE0000"/>
    
    <!-- Bottom blue stripe -->
    <rect x="0" y="42.666666666666664" width="64" height="21.333333333333332" fill="#032EA1"/>
    
    <!-- Shield shadow for 3D effect -->
    <path d="M 34 24.4 
             L 40.4 24.4 
             L 40.4 37.2 
             L 34 43.6 
             L 27.6 37.2 
             L 27.6 24.4 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- White shield with gradient -->
    <path d="M 32 22.4 
             L 38.4 22.4 
             L 38.4 35.2 
             L 32 41.6 
             L 25.6 35.2 
             L 25.6 22.4 Z" 
          fill="url(#shieldGradient)" 
          stroke="#CCCCCC" 
          stroke-width="1"/>
    
    <!-- Blue checkmark inside shield -->
    <g stroke="#032EA1" stroke-width="1.152" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Checkmark shadow -->
      <path d="M 30.12 33 
               L 31.56 35.16 
               L 35.88 30.84" 
            stroke="rgba(0,0,0,0.2)"/>
      
      <!-- Main checkmark -->
      <path d="M 29.12 32 
               L 30.56 34.16 
               L 34.88 29.84"/>
    </g>
  </g>
</svg>