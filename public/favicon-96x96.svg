<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded rectangle mask for iOS-style corners -->
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="96" height="96" rx="14.399999999999999" ry="14.399999999999999"/>
    </clipPath>
    
    <!-- Gradient for 3D shield effect -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F8F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Apply rounded corners -->
  <g clip-path="url(#roundedCorners)">
    <!-- Cambodian flag horizontal stripes (blue-red-blue) -->
    <!-- Top blue stripe -->
    <rect x="0" y="0" width="96" height="32" fill="#032EA1"/>
    
    <!-- Middle red stripe -->
    <rect x="0" y="32" width="96" height="32" fill="#DE0000"/>
    
    <!-- Bottom blue stripe -->
    <rect x="0" y="64" width="96" height="32" fill="#032EA1"/>
    
    <!-- Shield shadow for 3D effect -->
    <path d="M 50 35.6 
             L 59.6 35.6 
             L 59.6 54.8 
             L 50 64.4 
             L 40.4 54.8 
             L 40.4 35.6 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- White shield with gradient -->
    <path d="M 48 33.6 
             L 57.6 33.6 
             L 57.6 52.8 
             L 48 62.4 
             L 38.4 52.8 
             L 38.4 33.6 Z" 
          fill="url(#shieldGradient)" 
          stroke="#CCCCCC" 
          stroke-width="1"/>
    
    <!-- Blue checkmark inside shield -->
    <g stroke="#032EA1" stroke-width="1.7279999999999998" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Checkmark shadow -->
      <path d="M 44.68 49 
               L 46.84 52.24 
               L 53.32 45.76" 
            stroke="rgba(0,0,0,0.2)"/>
      
      <!-- Main checkmark -->
      <path d="M 43.68 48 
               L 45.84 51.24 
               L 52.32 44.76"/>
    </g>
  </g>
</svg>