      <stop offset="0%" style="stop-color:#D6001C;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#D6001C;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#00209F;stop-opacity:1" />
