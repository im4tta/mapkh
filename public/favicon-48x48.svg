<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D6001C;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#D6001C;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#00209F;stop-opacity:1" />
      <stop offset="66.66%" style="stop-color:#00209F;stop-opacity:1" />
      <stop offset="66.66%" style="stop-color:#D6001C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D6001C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background with Khmer flag colors -->
  <rect x="0" y="0" width="48" height="48" rx="7" ry="7" fill="url(#flagGradient)" />
  
  <!-- White shield in center -->
  <g transform="translate(9.5, 9.5)">
    <!-- Shield shape -->
    <path d="M 14.5 0 
             C 23.200000000000003 0, 29 8.7, 29 17.4
             C 29 26.1, 14.5 29, 14.5 29
             C 14.5 29, 0 26.1, 0 17.4
             C 0 8.7, 5.800000000000001 0, 14.5 0 Z" 
          fill="#FFFFFF" stroke="#00209F" stroke-width="2"/>
    
    <!-- Blue checkmark inside shield -->
    <g transform="translate(7.25, 8.7)">
      <path d="M 0 6 
               L 4.800000000000001 10.8 
               L 12 0" 
            stroke="#00209F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>