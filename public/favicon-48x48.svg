<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded rectangle mask for iOS-style corners -->
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="48" height="48" rx="7.199999999999999" ry="7.199999999999999"/>
    </clipPath>
    
    <!-- Gradient for 3D shield effect -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F8F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Apply rounded corners -->
  <g clip-path="url(#roundedCorners)">
    <!-- Cambodian flag horizontal stripes (blue-red-blue) -->
    <!-- Top blue stripe -->
    <rect x="0" y="0" width="48" height="16" fill="#032EA1"/>
    
    <!-- Middle red stripe -->
    <rect x="0" y="16" width="48" height="16" fill="#DE0000"/>
    
    <!-- Bottom blue stripe -->
    <rect x="0" y="32" width="48" height="16" fill="#032EA1"/>
    
    <!-- Shield shadow for 3D effect -->
    <path d="M 26 18.8 
             L 30.8 18.8 
             L 30.8 28.4 
             L 26 33.2 
             L 21.2 28.4 
             L 21.2 18.8 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- White shield with gradient -->
    <path d="M 24 16.8 
             L 28.8 16.8 
             L 28.8 26.4 
             L 24 31.2 
             L 19.2 26.4 
             L 19.2 16.8 Z" 
          fill="url(#shieldGradient)" 
          stroke="#CCCCCC" 
          stroke-width="1"/>
    
    <!-- Blue checkmark inside shield -->
    <g stroke="#032EA1" stroke-width="0.8639999999999999" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Checkmark shadow -->
      <path d="M 22.84 25 
               L 23.92 26.62 
               L 27.16 23.38" 
            stroke="rgba(0,0,0,0.2)"/>
      
      <!-- Main checkmark -->
      <path d="M 21.84 24 
               L 22.92 25.62 
               L 26.16 22.38"/>
    </g>
  </g>
</svg>