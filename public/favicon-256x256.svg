<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded rectangle mask for iOS-style corners -->
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="256" height="256" rx="38.4" ry="38.4"/>
    </clipPath>
    
    <!-- Gradient for 3D shield effect -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F8F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Apply rounded corners -->
  <g clip-path="url(#roundedCorners)">
    <!-- Cambodian flag horizontal stripes (blue-red-blue) -->
    <!-- Top blue stripe -->
    <rect x="0" y="0" width="256" height="85.33333333333333" fill="#032EA1"/>
    
    <!-- Middle red stripe -->
    <rect x="0" y="85.33333333333333" width="256" height="85.33333333333333" fill="#DE0000"/>
    
    <!-- Bottom blue stripe -->
    <rect x="0" y="170.66666666666666" width="256" height="85.33333333333333" fill="#032EA1"/>
    
    <!-- Shield shadow for 3D effect -->
    <path d="M 130 91.6 
             L 155.6 91.6 
             L 155.6 142.8 
             L 130 168.4 
             L 104.4 142.8 
             L 104.4 91.6 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- White shield with gradient -->
    <path d="M 128 89.6 
             L 153.6 89.6 
             L 153.6 140.8 
             L 128 166.4 
             L 102.4 140.8 
             L 102.4 89.6 Z" 
          fill="url(#shieldGradient)" 
          stroke="#CCCCCC" 
          stroke-width="1"/>
    
    <!-- Blue checkmark inside shield -->
    <g stroke="#032EA1" stroke-width="4.608" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Checkmark shadow -->
      <path d="M 117.48 129 
               L 123.24 137.64 
               L 140.52 120.36" 
            stroke="rgba(0,0,0,0.2)"/>
      
      <!-- Main checkmark -->
      <path d="M 116.48 128 
               L 122.24 136.64 
               L 139.52 119.36"/>
    </g>
  </g>
</svg>