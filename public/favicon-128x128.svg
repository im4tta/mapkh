<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded rectangle mask for iOS-style corners -->
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="128" height="128" rx="19.2" ry="19.2"/>
    </clipPath>
    
    <!-- Gradient for 3D shield effect -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F8F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Apply rounded corners -->
  <g clip-path="url(#roundedCorners)">
    <!-- Cambodian flag horizontal stripes (blue-red-blue) -->
    <!-- Top blue stripe -->
    <rect x="0" y="0" width="128" height="42.666666666666664" fill="#032EA1"/>
    
    <!-- Middle red stripe -->
    <rect x="0" y="42.666666666666664" width="128" height="42.666666666666664" fill="#DE0000"/>
    
    <!-- Bottom blue stripe -->
    <rect x="0" y="85.33333333333333" width="128" height="42.666666666666664" fill="#032EA1"/>
    
    <!-- Shield shadow for 3D effect -->
    <path d="M 66 46.8 
             L 78.8 46.8 
             L 78.8 72.4 
             L 66 85.2 
             L 53.2 72.4 
             L 53.2 46.8 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- White shield with gradient -->
    <path d="M 64 44.8 
             L 76.8 44.8 
             L 76.8 70.4 
             L 64 83.2 
             L 51.2 70.4 
             L 51.2 44.8 Z" 
          fill="url(#shieldGradient)" 
          stroke="#CCCCCC" 
          stroke-width="1"/>
    
    <!-- Blue checkmark inside shield -->
    <g stroke="#032EA1" stroke-width="2.304" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Checkmark shadow -->
      <path d="M 59.24 65 
               L 62.12 69.32 
               L 70.76 60.68" 
            stroke="rgba(0,0,0,0.2)"/>
      
      <!-- Main checkmark -->
      <path d="M 58.24 64 
               L 61.12 68.32 
               L 69.76 59.68"/>
    </g>
  </g>
</svg>