<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded rectangle mask for iOS-style corners -->
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="32" height="32" rx="4.8" ry="4.8"/>
    </clipPath>
    
    <!-- Gradient for 3D shield effect -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F8F8F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Apply rounded corners -->
  <g clip-path="url(#roundedCorners)">
    <!-- Cambodian flag horizontal stripes (blue-red-blue) -->
    <!-- Top blue stripe -->
    <rect x="0" y="0" width="32" height="10.666666666666666" fill="#032EA1"/>
    
    <!-- Middle red stripe -->
    <rect x="0" y="10.666666666666666" width="32" height="10.666666666666666" fill="#DE0000"/>
    
    <!-- Bottom blue stripe -->
    <rect x="0" y="21.333333333333332" width="32" height="10.666666666666666" fill="#032EA1"/>
    
    <!-- Shield shadow for 3D effect -->
    <path d="M 18 13.2 
             L 21.2 13.2 
             L 21.2 19.6 
             L 18 22.8 
             L 14.8 19.6 
             L 14.8 13.2 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- White shield with gradient -->
    <path d="M 16 11.2 
             L 19.2 11.2 
             L 19.2 17.6 
             L 16 20.8 
             L 12.8 17.6 
             L 12.8 11.2 Z" 
          fill="url(#shieldGradient)" 
          stroke="#CCCCCC" 
          stroke-width="1"/>
    
    <!-- Blue checkmark inside shield -->
    <g stroke="#032EA1" stroke-width="0.576" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Checkmark shadow -->
      <path d="M 15.56 17 
               L 16.28 18.08 
               L 18.44 15.92" 
            stroke="rgba(0,0,0,0.2)"/>
      
      <!-- Main checkmark -->
      <path d="M 14.56 16 
               L 15.28 17.08 
               L 17.44 14.92"/>
    </g>
  </g>
</svg>